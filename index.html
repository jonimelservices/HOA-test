<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida HOA Community Website</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and Babel for JSX transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Font Awesome for icons (kept for minimal use if needed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Google Fonts: Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(120deg, #f0f9ff 0%, #e0f2fe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
        }
        #app-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 1rem;
            overflow: hidden;
        }
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        // This code connects your website to your Supabase backend
        const { createClient } = supabase;

        const supabaseUrl = 'https://hxcimfsnaiohmwfyeoiq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4Y2ltZnNuYWlvaG13Znllb2lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE1ODAzNjEsImV4cCI6MjA2NzE1NjM2MX0.hi5NYQQq0EuLE3g2FFpHt4PsPQKK14MtrEML5_QLpq4';

        const supabase = createClient(supabaseUrl, supabaseKey);
    
        const { useState, useEffect, useRef } = React;
        
        // --- Theme Definitions ---
        const themeClasses = {
            blue: { name: 'Blue', bg: 'bg-blue-600', hoverBg: 'hover:bg-blue-700', text: 'text-blue-600', hoverText: 'hover:text-blue-600', border: 'focus:border-blue-500', ring: 'focus:ring-blue-500', iconBg: 'bg-blue-100', iconText: 'text-blue-600' },
            green: { name: 'Green', bg: 'bg-green-600', hoverBg: 'hover:bg-green-700', text: 'text-green-600', hoverText: 'hover:text-green-600', border: 'focus:border-green-500', ring: 'focus:ring-green-500', iconBg: 'bg-green-100', iconText: 'text-green-600' },
            teal: { name: 'Teal', bg: 'bg-teal-600', hoverBg: 'hover:bg-teal-700', text: 'text-teal-600', hoverText: 'hover:text-teal-600', border: 'focus:border-teal-500', ring: 'focus:ring-teal-500', iconBg: 'bg-teal-100', iconText: 'text-teal-600' },
            indigo: { name: 'Indigo', bg: 'bg-indigo-600', hoverBg: 'hover:bg-indigo-700', text: 'text-indigo-600', hoverText: 'hover:text-indigo-600', border: 'focus:border-indigo-500', ring: 'focus:ring-indigo-500', iconBg: 'bg-indigo-100', iconText: 'text-indigo-600' },
            purple: { name: 'Purple', bg: 'bg-purple-600', hoverBg: 'hover:bg-purple-700', text: 'text-purple-600', hoverText: 'hover:text-purple-600', border: 'focus:border-purple-500', ring: 'focus:ring-purple-500', iconBg: 'bg-purple-100', iconText: 'text-purple-600' },
            red: { bg: 'bg-red-500', hoverBg: 'hover:bg-red-600' },
            gray: { bg: 'bg-gray-500', hoverBg: 'hover:bg-gray-600' }
        };

        // ===================================================================================
        // --- INITIAL HOA CONFIGURATION ---
        // ===================================================================================
        const initialHoaConfig = {
            id: 1,
            hoaName: "Sunny Palms HOA",
            heroImageUrl: "https://images.pexels.com/photos/210552/pexels-photo-210552.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
            managementCompanyInfo: "Our community is professionally managed by Example Management Company. They are responsible for the day-to-day operations, maintenance of common areas, and financial management. For any inquiries, please contact them directly.",
            contactInfo: {
                email: "board@sunnypalmshoa.com",
                phone: "555-123-4567",
                address: "123 Ocean View Dr, Miami, FL 33139",
                propertyManager: "Alex Green"
            },
            boardMembers: [
                { title: "President", name: "Jane Doe" },
                { title: "Vice President", name: "John Smith" },
                { title: "Treasurer", name: "Emily White" },
                { title: "Secretary", name: "Michael Brown" },
            ],
            themeName: 'blue'
        };
        
        // --- Helper Functions ---
        const triggerNotification = async (type, subject, showNotification) => {
            try {
                const { error } = await supabase.functions.invoke('send-notifications', {
                    body: JSON.stringify({ type, subject }),
                });
                if (error) throw error;
                showNotification("Notifications sent to members.");
            } catch (error) {
                console.error("Error sending notification:", error.message);
                showNotification("Could not send notifications.");
            }
        };

        const logAccess = async (user, documentName) => {
            try {
                const { error } = await supabase.from('access_logs').insert({
                    user_id: user.id,
                    user_email: user.email,
                    document_name: documentName
                });
                if (error) throw error;
            } catch (error) {
                console.error("Error logging access:", error.message);
            }
        };

        // --- Reusable Components ---

        const Header = ({ config, theme, userRole, onLogout, onNavigate }) => (
            <header className="glass-header sticky top-0 z-50 transition-all duration-300">
                <nav className="container mx-auto px-8 py-4 flex justify-between items-center">
                    <div className="flex items-center space-x-4 cursor-pointer" onClick={() => onNavigate('home')}>
                       <div className={`${theme.bg} p-3 rounded-xl shadow-lg`}>
                           <i className="fas fa-home text-white text-xl"></i>
                       </div>
                       <span className="text-2xl font-extrabold text-gray-800">{config.hoaName}</span>
                    </div>
                    <div className="hidden md:flex items-center space-x-10">
                        <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('home'); }} className={`text-gray-700 font-semibold text-lg hover:text-gray-900 transition duration-300`}>Home</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('about'); }} className={`text-gray-700 font-semibold text-lg hover:text-gray-900 transition duration-300`}>About</a>
                        {userRole && <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('dashboard'); }} className={`text-gray-700 font-semibold text-lg hover:text-gray-900 transition duration-300`}>Dashboard</a>}
                    </div>
                    <div>
                        {userRole ? (
                             <button onClick={onLogout} className={`bg-red-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-red-600 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5`}>Logout</button>
                        ) : (
                             <button onClick={() => onNavigate('login')} className={`${theme.bg} text-white font-bold py-3 px-6 rounded-xl ${theme.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5`}>Member Login</button>
                        )}
                    </div>
                </nav>
            </header>
        );

        const Footer = ({ config }) => ( <footer className="bg-gray-900 text-white py-12"><div className="container mx-auto px-8 text-center text-gray-400"><p>&copy; {new Date().getFullYear()} {config.hoaName}. All Rights Reserved.</p><p className="text-base mt-2">Managed by Your HOA Board | Website compliant with Florida Statute 720.</p></div></footer>);
        
        const ConfirmationModal = ({ theme, message, onConfirm, onCancel }) => (
            <div className="modal-backdrop">
                <div className="bg-white p-10 rounded-xl shadow-2xl w-full max-w-md relative text-center">
                    <h2 className="text-2xl font-bold text-gray-800 mb-5">Confirm Action</h2>
                    <p className="text-gray-600 text-lg mb-8">{message}</p>
                    <div className="mt-8 flex justify-center gap-5">
                        <button onClick={onCancel} className="bg-gray-200 text-gray-800 font-semibold py-3 px-8 rounded-lg hover:bg-gray-300">
                            Cancel
                        </button>
                        <button onClick={onConfirm} className={`${themeClasses.red.bg} text-white font-semibold py-3 px-8 rounded-lg ${themeClasses.red.hoverBg}`}>
                            Delete
                        </button>
                    </div>
                </div>
            </div>
        );

        const Notification = ({ message, onDismiss }) => {
            useEffect(() => {
                const timer = setTimeout(() => {
                    onDismiss();
                }, 3000);
                return () => clearTimeout(timer);
            }, [onDismiss]);

            return (
                <div className="fixed top-28 right-8 bg-green-500 text-white py-4 px-8 rounded-xl shadow-lg z-50 animate-fade-in-out text-lg">
                    {message}
                </div>
            );
        };
        
        const ScrollToTopButton = ({theme}) => {
            const [isVisible, setIsVisible] = useState(false);

            const toggleVisibility = () => {
                if(window.pageYOffset > 300){
                    setIsVisible(true);
                } else {
                    setIsVisible(false);
                }
            };
            
            const scrollToTop = () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            };

            useEffect(() => {
                window.addEventListener('scroll', toggleVisibility);
                return () => {
                    window.removeEventListener('scroll', toggleVisibility);
                };
            }, []);
            
            return (
                <button 
                    onClick={scrollToTop} 
                    className={`${isVisible ? 'opacity-100' : 'opacity-0'} ${theme.bg} text-white rounded-full fixed bottom-10 right-10 w-14 h-14 shadow-lg flex items-center justify-center text-xl transition-opacity duration-300 z-50 hover:scale-110`}
                >
                    <i className="fas fa-arrow-up"></i>
                </button>
            )
        };


        // --- Page Components ---

        const HomePage = ({ config, theme, onNavigate, showNotification }) => (
            <div className="fade-in">
                <section 
                    className="relative text-white text-center py-32 px-6 bg-cover bg-center"
                    style={{ backgroundImage: `url('${config.heroImageUrl}')` }}
                >
                    <div className="absolute inset-0 bg-black bg-opacity-60"></div>
                    <div className="relative z-10">
                        <h1 className="text-5xl md:text-7xl font-extrabold mb-5 drop-shadow-lg">Welcome to {config.hoaName}</h1>
                        <p className="text-xl md:text-2xl max-w-4xl mx-auto drop-shadow-md">Your source for official HOA information, documents, and news.</p>
                    </div>
                </section>
                <section className="container mx-auto px-8 py-24">
                    <div className="grid md:grid-cols-2 gap-20 items-center">
                        <div className="bg-white p-10 rounded-2xl shadow-xl">
                            <h2 className="text-4xl font-bold text-gray-800 mb-8">Contact Us</h2>
                            <ContactForm theme={theme} showNotification={showNotification} />
                        </div>
                        <div className="space-y-8">
                            <h3 className="text-4xl font-bold text-gray-800 mb-6">Quick Links</h3>
                                <div onClick={() => onNavigate('login')} className="flex items-center p-8 bg-white rounded-2xl shadow-xl hover:shadow-2xl cursor-pointer transition-all duration-300 transform hover:-translate-y-2">
                                    <div className={`${theme.iconBg} p-5 rounded-full mr-8`}>
                                     <i className={`fas fa-sign-in-alt ${theme.iconText} text-3xl`}></i>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-2xl text-gray-800">Member Portal</h4>
                                        <p className="text-gray-600 text-lg">Access documents, meetings, and more.</p>
                                    </div>
                                </div>
                                <div onClick={() => onNavigate('about')} className="flex items-center p-8 bg-white rounded-2xl shadow-xl hover:shadow-2xl cursor-pointer transition-all duration-300 transform hover:-translate-y-2">
                                    <div className={`${theme.iconBg} p-5 rounded-full mr-8`}>
                                     <i className={`fas fa-info-circle ${theme.iconText} text-3xl`}></i>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-2xl text-gray-800">About the HOA</h4>
                                        <p className="text-gray-600 text-lg">Learn about our board and rules.</p>
                                    </div>
                                </div>
                        </div>
                    </div>
                </section>
            </div>
        );
        const AboutPage = ({ config, theme }) => ( <div className="container mx-auto px-8 py-20 fade-in"><h1 className="text-5xl font-extrabold text-center text-gray-800 mb-16">About {config.hoaName}</h1><div className="bg-white p-12 rounded-2xl shadow-xl max-w-5xl mx-auto"><h2 className="text-4xl font-bold text-gray-800 mb-6">Management Company</h2><p className="text-gray-700 leading-relaxed text-lg mb-10">{config.managementCompanyInfo}</p><h2 className="text-4xl font-bold text-gray-800 mb-8">Board of Directors</h2><ul className="space-y-5 text-gray-700">{config.boardMembers.map((member, index) => (<li key={index} className="text-xl"><strong className="font-semibold">{member.title}:</strong> {member.name}</li>))}</ul><div className="border-t my-10"></div><h2 className="text-4xl font-bold text-gray-800 mt-10 mb-6">Contact Information</h2><p className="text-gray-700 leading-relaxed text-xl"><strong>Property Manager:</strong> {config.contactInfo.propertyManager}<br/><strong>Email:</strong> <a href={`mailto:${config.contactInfo.email}`} className={`${theme.text} hover:underline font-semibold`}>{config.contactInfo.email}</a><br/><strong>Phone:</strong> {config.contactInfo.phone}<br/><strong>Address:</strong> {config.contactInfo.address}</p></div></div>);
        
        const AccountPage = ({ theme, user, setUser, showNotification, onNavigate }) => {
            const [formData, setFormData] = useState(user);
            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };
            
            const handleSave = async () => {
                const { error } = await supabase
                    .from('users')
                    .update({ 
                        full_name: formData.full_name, 
                        email: formData.email,
                        notify_new_documents: formData.notify_new_documents,
                        notify_new_meetings: formData.notify_new_meetings
                    })
                    .eq('id', user.id);

                if (error) {
                    showNotification("Error updating profile: " + error.message);
                } else {
                    setUser(formData);
                    showNotification("Account details updated successfully!");
                }
            };

            const handleChangePassword = async () => {
                if (newPassword !== confirmPassword) {
                    showNotification("New passwords do not match.");
                    return;
                }
                if (newPassword.length < 6) {
                    showNotification("Password must be at least 6 characters long.");
                    return;
                }

                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showNotification("Error changing password: " + error.message);
                } else {
                    showNotification("Password changed successfully!");
                    setNewPassword('');
                    setConfirmPassword('');
                }
            };

            if (!user) return <div className="container mx-auto px-8 py-16">Loading...</div>;

            return (
                 <div className="container mx-auto px-8 py-20 fade-in">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-5xl font-extrabold text-gray-800">Account Settings</h1>
                        <button onClick={() => onNavigate('dashboard')} className="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 flex items-center gap-2">
                            <i className="fas fa-arrow-left"></i> Back to Dashboard
                        </button>
                    </div>
                    <div className="bg-white p-10 rounded-2xl shadow-xl max-w-3xl mx-auto">
                        <div className="space-y-8">
                            <div>
                                <label className="block text-base font-bold text-gray-700 mb-2">Full Name</label>
                                <input 
                                    type="text" 
                                    name="full_name"
                                    value={formData.full_name || ''} 
                                    onChange={handleInputChange} 
                                    className={`w-full px-5 py-4 border rounded-xl text-lg ${theme.ring} ${theme.border}`} 
                                />
                            </div>
                            <div>
                                <label className="block text-base font-bold text-gray-700 mb-2">Email Address</label>
                                <input 
                                    type="email" 
                                    name="email"
                                    value={formData.email || ''} 
                                    onChange={handleInputChange} 
                                    className={`w-full px-5 py-4 border rounded-xl text-lg ${theme.ring} ${theme.border}`} 
                                />
                            </div>
                        </div>

                        <div className="mt-10 border-t pt-8">
                             <h2 className="text-3xl font-bold text-gray-700 mb-6">Notification Preferences</h2>
                             <div className="space-y-5">
                                <label className="flex items-center text-lg">
                                    <input type="checkbox" name="notify_new_documents" checked={formData.notify_new_documents} onChange={handleInputChange} className="h-6 w-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                                    <span className="ml-4 text-gray-700">Email me for new documents</span>
                                </label>
                                 <label className="flex items-center text-lg">
                                    <input type="checkbox" name="notify_new_meetings" checked={formData.notify_new_meetings} onChange={handleInputChange} className="h-6 w-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                                    <span className="ml-4 text-gray-700">Email me for upcoming meetings</span>
                                </label>
                             </div>
                        </div>
                        <div className="mt-8 pt-8 border-t">
                             <button onClick={handleSave} className={`w-full ${theme.bg} text-white font-bold py-4 px-5 rounded-xl text-lg ${theme.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5`}>
                                Save All Changes
                            </button>
                        </div>

                        <div className="mt-10 border-t pt-8">
                            <h2 className="text-3xl font-bold text-gray-700 mb-6">Change Password</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">New Password</label>
                                    <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Confirm New Password</label>
                                    <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} />
                                </div>
                            </div>
                            <div className="mt-6">
                                <button onClick={handleChangePassword} className={`w-full ${themeClasses.gray.bg} text-white font-bold py-3 px-4 rounded-xl text-lg ${themeClasses.gray.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5`}>
                                    Change Password
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const ContactForm = ({ theme, showNotification }) => {
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [captcha, setCaptcha] = useState({ num1: 0, num2: 0, answer: '' });
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                setCaptcha({ num1: Math.floor(Math.random() * 10) + 1, num2: Math.floor(Math.random() * 10) + 1, answer: ''});
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCaptchaChange = (e) => {
                setCaptcha(prev => ({...prev, answer: e.target.value}));
            }

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (parseInt(captcha.answer) !== captcha.num1 + captcha.num2) {
                    showNotification("Incorrect CAPTCHA answer. Please try again.");
                    return;
                }
                setIsLoading(true);
                try {
                    const { error } = await supabase.functions.invoke('send-contact-email', {
                        body: JSON.stringify(formData)
                    });
                    if (error) throw error;
                    showNotification("Message sent successfully!");
                    setFormData({ name: '', email: '', message: '' });
                    setCaptcha({ num1: Math.floor(Math.random() * 10) + 1, num2: Math.floor(Math.random() * 10) + 1, answer: ''});
                } catch (error) {
                    console.error("Error sending contact form:", error);
                    showNotification("Error sending message. Please try again.");
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-6">
                    <input type="text" name="name" value={formData.name} onChange={handleInputChange} placeholder="Your Name" className={`w-full px-5 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} required />
                    <input type="email" name="email" value={formData.email} onChange={handleInputChange} placeholder="Your Email" className={`w-full px-5 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} required />
                    <textarea name="message" value={formData.message} onChange={handleInputChange} placeholder="Your Message" rows="5" className={`w-full px-5 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} required></textarea>
                    <div className="flex items-center gap-4">
                        <label className="text-gray-700 text-lg">{captcha.num1} + {captcha.num2} = ?</label>
                        <input type="number" value={captcha.answer} onChange={handleCaptchaChange} className={`w-28 px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} required />
                    </div>
                    <button type="submit" disabled={isLoading} className={`w-full ${theme.bg} text-white font-semibold py-4 px-5 rounded-xl text-lg ${theme.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 disabled:bg-gray-400`}>
                        {isLoading ? <div className="loader mx-auto h-6 w-6"></div> : 'Send Message'}
                    </button>
                </form>
            );
        };
        
        const LoginPage = ({ theme, onLogin, showNotification, onNavigate }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handleLogin = async () => {
                setIsLoading(true);
                setError('');
                const { data: { user }, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (authError) {
                    setError(authError.message);
                    showNotification("Login failed: " + authError.message);
                    setIsLoading(false);
                } else if (user) {
                    const { data: userData, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', user.id)
                        .single();

                    if (userError || !userData) {
                        setError("Could not retrieve user profile. Please contact support.");
                        showNotification("Login failed: Could not retrieve user profile.");
                        await supabase.auth.signOut();
                        setIsLoading(false);
                    } else {
                        onLogin(userData);
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center fade-in p-6">
                    <div className="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg">
                        <div className="text-center mb-10">
                            <div className={`${theme.bg} inline-block p-4 rounded-full mb-5`}>
                                <i className="fas fa-lock text-white text-3xl"></i>
                            </div>
                            <h1 className="text-4xl font-bold text-gray-800">Portal Login</h1>
                        </div>
                        {error && <p className="text-red-500 text-center mb-5 font-semibold text-lg">{error}</p>}
                        <div className="space-y-8">
                            <div>
                                <label className="block text-base font-medium text-gray-700 mb-2">Email</label>
                                <input type="email" onChange={(e) => setEmail(e.target.value)} className={`w-full px-5 py-4 border rounded-xl text-lg ${theme.ring} ${theme.border}`} placeholder="Enter your email" />
                            </div>
                            <div>
                                <label className="block text-base font-medium text-gray-700 mb-2">Password</label>
                                <input type="password" onChange={(e) => setPassword(e.target.value)} className={`w-full px-5 py-4 border rounded-xl text-lg ${theme.ring} ${theme.border}`} placeholder="Enter your password" />
                            </div>
                        </div>
                        <div className="mt-4 text-right">
                            <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('reset-password'); }} className={`text-sm ${theme.text} hover:underline font-semibold`}>Forgot Password?</a>
                        </div>
                        <div className="mt-6">
                            <button onClick={handleLogin} disabled={isLoading} className={`w-full ${theme.bg} text-white font-bold py-4 px-5 rounded-xl text-lg ${theme.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 disabled:bg-gray-400`}>
                                {isLoading ? <div className="loader mx-auto h-6 w-6"></div> : 'Login'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ResetPasswordPage = ({ theme, showNotification, onNavigate }) => {
            const [email, setEmail] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handlePasswordReset = async () => {
                setIsLoading(true);
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin,
                });
                if (error) {
                    showNotification("Error: " + error.message);
                } else {
                    showNotification("Password recovery email sent!");
                    onNavigate('login');
                }
                setIsLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center fade-in p-6">
                    <div className="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-bold text-gray-800">Reset Password</h1>
                            <p className="text-gray-600 mt-4">Enter your email to receive a password reset link.</p>
                        </div>
                        <div className="space-y-8">
                            <div>
                                <label className="block text-base font-medium text-gray-700 mb-2">Email</label>
                                <input type="email" onChange={(e) => setEmail(e.target.value)} className={`w-full px-5 py-4 border rounded-xl text-lg ${theme.ring} ${theme.border}`} placeholder="Enter your email" />
                            </div>
                        </div>
                        <div className="mt-10">
                            <button onClick={handlePasswordReset} disabled={isLoading} className={`w-full ${theme.bg} text-white font-bold py-4 px-5 rounded-xl text-lg ${theme.hoverBg} transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 disabled:bg-gray-400`}>
                                {isLoading ? <div className="loader mx-auto h-6 w-6"></div> : 'Send Recovery Email'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        
        const AdminPage = ({ config, setConfig, theme, themeName, setThemeName, showNotification, onNavigate }) => {
            const [localConfig, setLocalConfig] = useState(config);
            const [localThemeName, setLocalThemeName] = useState(themeName);
            const [activeTab, setActiveTab] = useState('general');

            const handleConfigChange = (e) => {
                const { name, value } = e.target;
                setLocalConfig(prev => ({ ...prev, [name]: value }));
            };
            
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLocalConfig(prev => ({ ...prev, heroImageUrl: reader.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleContactChange = (e) => {
                const { name, value } = e.target;
                setLocalConfig(prev => ({ ...prev, contactInfo: { ...prev.contactInfo, [name]: value } }));
            };

            const handleBoardChange = (index, e) => {
                const { name, value } = e.target;
                const updatedBoard = [...localConfig.boardMembers];
                updatedBoard[index] = { ...updatedBoard[index], [name]: value };
                setLocalConfig(prev => ({ ...prev, boardMembers: updatedBoard }));
            };

            const addBoardMember = () => setLocalConfig(prev => ({ ...prev, boardMembers: [...prev.boardMembers, { title: '', name: '' }] }));
            const removeBoardMember = (index) => setLocalConfig(prev => ({ ...prev, boardMembers: localConfig.boardMembers.filter((_, i) => i !== index) }));

            const handleSave = async () => {
                const { error } = await supabase
                    .from('configuration')
                    .upsert({ 
                        id: 1, // Ensure we always target the same row
                        hoaName: localConfig.hoaName,
                        heroImageUrl: localConfig.heroImageUrl,
                        managementCompanyInfo: localConfig.managementCompanyInfo,
                        contactInfo: localConfig.contactInfo,
                        boardMembers: localConfig.boardMembers,
                        themeName: localThemeName
                     }, { onConflict: 'id' });

                if (error) {
                    showNotification("Error saving settings: " + error.message);
                } else {
                    setConfig(localConfig);
                    setThemeName(localThemeName);
                    showNotification("Admin settings saved successfully!");
                }
            };

            const handleReset = () => {
                setLocalConfig(config);
                setLocalThemeName(themeName);
                showNotification("Changes have been discarded.");
            };

            const renderTabContent = () => {
                switch (activeTab) {
                    case 'general':
                        return ( 
                            <div className="space-y-8">
                                <div>
                                    <label className="block text-base font-medium text-gray-700">HOA Name</label>
                                    <input type="text" name="hoaName" value={localConfig.hoaName} onChange={handleConfigChange} className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} />
                                </div>
                                <div>
                                    <label className="block text-base font-medium text-gray-700">Hero Image</label>
                                    <div className="mt-3 flex items-center gap-5">
                                        <img src={localConfig.heroImageUrl} alt="Hero preview" className="w-56 h-28 object-cover rounded-lg bg-gray-100" />
                                        <input type="file" accept="image/jpeg, image/png" onChange={handleImageUpload} className="text-base text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200"/>
                                    </div>
                                </div>
                            </div> 
                        );
                    case 'content':
                        return ( <div className="space-y-8"><div><label className="block text-base font-medium text-gray-700">Management Company Information</label><textarea name="managementCompanyInfo" value={localConfig.managementCompanyInfo} onChange={handleConfigChange} rows="5" className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`}></textarea></div><div><label className="block text-base font-medium text-gray-700">Property Manager Name</label><input type="text" name="propertyManager" value={localConfig.contactInfo.propertyManager} onChange={handleContactChange} className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} /></div><div><label className="block text-base font-medium text-gray-700">Contact Email</label><input type="email" name="email" value={localConfig.contactInfo.email} onChange={handleContactChange} className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} /></div><div><label className="block text-base font-medium text-gray-700">Contact Phone</label><input type="tel" name="phone" value={localConfig.contactInfo.phone} onChange={handleContactChange} className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} /></div><div><label className="block text-base font-medium text-gray-700">Contact Address</label><input type="text" name="address" value={localConfig.contactInfo.address} onChange={handleContactChange} className={`mt-2 w-full px-4 py-3 border rounded-xl text-lg ${theme.ring} ${theme.border}`} /></div><div><h4 className="text-xl font-semibold text-gray-800 mb-3">Board Members</h4><div className="space-y-4">{localConfig.boardMembers.map((member, index) => ( <div key={index} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><input type="text" name="title" value={member.title} onChange={(e) => handleBoardChange(index, e)} placeholder="Title" className="w-1/2 px-3 py-2 border rounded-lg text-lg" /><input type="text" name="name" value={member.name} onChange={(e) => handleBoardChange(index, e)} placeholder="Full Name" className="w-1/2 px-3 py-2 border rounded-lg text-lg" /><button onClick={() => removeBoardMember(index)} className="text-red-500 hover:text-red-700 p-2 text-lg"><i className="fas fa-trash-alt"></i></button></div> ))}</div><button onClick={addBoardMember} className={`mt-4 ${theme.bg} text-white font-semibold py-2 px-4 rounded-lg ${theme.hoverBg} text-base`}>Add Member</button></div></div> );
                    case 'theme':
                        return ( <div><p className="text-gray-600 text-lg mb-5">Select a primary color. This change will be applied after you save.</p><div className="flex flex-wrap gap-4">{Object.keys(themeClasses).filter(key => themeClasses[key].name).map(key => ( <button key={key} onClick={() => setLocalThemeName(key)} className={`px-5 py-3 rounded-xl font-semibold text-white transition-all duration-200 ${themeClasses[key].bg} ${themeClasses[key].hoverBg} ${localThemeName === key ? 'ring-4 ring-offset-2 ' + themeClasses[key].ring.replace('focus:','') : ''}`}>{themeClasses[key].name}</button> ))}</div></div> );
                    default: return null;
                }
            };
            const TabButton = ({ tabName, label }) => ( <button onClick={() => setActiveTab(tabName)} className={`px-5 py-3 text-lg font-semibold rounded-t-lg border-b-4 ${activeTab === tabName ? `${theme.text} border-current` : 'text-gray-500 border-transparent hover:text-gray-700'}`}>{label}</button> );
            return ( <div className="container mx-auto px-8 py-16"><div className="flex justify-between items-center mb-8"><h1 className="text-5xl font-extrabold text-gray-800">Administrator Controls</h1><button onClick={() => onNavigate('dashboard')} className="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 flex items-center gap-2"><i className="fas fa-arrow-left"></i> Back to Dashboard</button></div><div className="bg-white rounded-2xl shadow-xl"><div className="border-b border-gray-200"><nav className="-mb-px flex space-x-6 px-8"><TabButton tabName="general" label="General Settings" /><TabButton tabName="content" label="Content Editor" /><TabButton tabName="theme" label="Theme" /></nav></div><div className="p-10">{renderTabContent()}</div><div className="bg-gray-50 px-8 py-5 flex justify-end items-center gap-5 rounded-b-2xl border-t"><button onClick={handleReset} className="bg-gray-200 text-gray-800 font-bold py-3 px-6 rounded-xl hover:bg-gray-300 text-lg">Reset</button><button onClick={handleSave} className={`${theme.bg} text-white font-bold py-3 px-8 rounded-xl ${theme.hoverBg} text-lg`}>Save All Changes</button></div></div></div> );
        };

        const DashboardPage = ({ theme, onNavigate, userRole }) => (
            <div className="container mx-auto px-8 py-20 fade-in">
                <h1 className="text-5xl font-extrabold text-gray-800 mb-12">Dashboard</h1>
                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-10">
                    <div onClick={() => onNavigate('documents')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 cursor-pointer flex flex-col items-center text-center"><div className={`${theme.iconBg} p-6 rounded-full mb-5`}><i className={`fas fa-file-alt ${theme.iconText} text-4xl`}></i></div><h2 className="text-2xl font-bold text-gray-800">Documents</h2><p className="text-gray-600 mt-2 text-lg">View records & bylaws.</p></div>
                    <div onClick={() => onNavigate('calendar')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 cursor-pointer flex flex-col items-center text-center"><div className="bg-green-100 p-6 rounded-full mb-5"><i className="fas fa-calendar-alt text-green-600 text-4xl"></i></div><h2 className="text-2xl font-bold text-gray-800">Event Calendar</h2><p className="text-gray-600 mt-2 text-lg">See upcoming events.</p></div>
                    <div onClick={() => onNavigate('account')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 cursor-pointer flex flex-col items-center text-center"><div className="bg-purple-100 p-6 rounded-full mb-5"><i className="fas fa-user-cog text-purple-600 text-4xl"></i></div><h2 className="text-2xl font-bold text-gray-800">Account Settings</h2><p className="text-gray-600 mt-2 text-lg">Manage your profile.</p></div>
                    {userRole === 'admin' && (
                         <div onClick={() => onNavigate('admin')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 cursor-pointer flex flex-col items-center text-center">
                            <div className="bg-yellow-100 p-6 rounded-full mb-5"><i className="fas fa-shield-alt text-yellow-600 text-4xl"></i></div>
                            <h2 className="text-2xl font-bold text-gray-800">Admin Controls</h2><p className="text-gray-600 mt-2 text-lg">Edit site settings.</p>
                        </div>
                    )}
                </div>
            </div>
        );
        
        const EventModal = ({ theme, event, onClose, onSave }) => {
            const [formData, setFormData] = useState(event || { title: '', date: '', time: '', location: '', attachment_name: '', attachment_url: '' });
            const [file, setFile] = useState(null);

            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleFileChange = (e) => setFile(e.target.files[0]);

            return (
                <div className="modal-backdrop">
                    <div className="bg-white p-8 rounded-lg shadow-2xl w-full max-w-lg relative max-h-[90vh] overflow-y-auto">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
                        <h2 className="text-2xl font-bold text-gray-800 mb-6">{event ? 'Edit Event' : 'Add New Event'}</h2>
                        <div className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700">Event Title</label><input type="text" name="title" value={formData.title} onChange={handleInputChange} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} /></div>
                            <div><label className="block text-sm font-medium text-gray-700">Date</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} /></div>
                            <div><label className="block text-sm font-medium text-gray-700">Time</label><input type="text" name="time" value={formData.time} onChange={handleInputChange} placeholder="e.g., 7:00 PM" className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} /></div>
                            <div><label className="block text-sm font-medium text-gray-700">Location</label><input type="text" name="location" value={formData.location} onChange={handleInputChange} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} /></div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Attach File</label>
                                <input type="file" onChange={handleFileChange} className="mt-1 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-gray-100" />
                                {formData.attachment_name && !file && <p className="text-sm text-gray-500 mt-1">Current file: {formData.attachment_name}</p>}
                            </div>
                        </div>
                        <div className="mt-8 flex justify-end gap-4"><button onClick={onClose} className="bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300">Cancel</button><button onClick={() => onSave({...formData, file})} className={`${theme.bg} text-white font-semibold py-2 px-4 rounded-lg ${theme.hoverBg}`}>Save Event</button></div>
                    </div>
                </div>
            );
        };
        
        const CalendarPage = ({ theme, userRole, showNotification, onNavigate }) => {
            const [events, setEvents] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [editingEvent, setEditingEvent] = useState(null);
            const [confirmingDelete, setConfirmingDelete] = useState(null);

            const fetchEvents = async () => {
                setIsLoading(true);
                const { data, error } = await supabase.from('events').select('*').order('date', { ascending: true });
                if(error) {
                    console.error("Error fetching events:", error);
                    showNotification("Error fetching events.");
                } else {
                    setEvents(data);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                fetchEvents();
            }, []);

            const handleSaveEvent = async (eventData) => {
                const { file, ...eventDetails } = eventData;
                let attachment_url = eventDetails.attachment_url;
                let attachment_name = eventDetails.attachment_name;

                if (file) {
                    const filePath = `${Date.now()}-${file.name}`;
                    const { error: uploadError } = await supabase.storage.from('event-attachments').upload(filePath, file);
                    if (uploadError) {
                        showNotification("Error uploading file.");
                        return;
                    }
                    const { data: urlData } = supabase.storage.from('event-attachments').getPublicUrl(filePath);
                    attachment_url = urlData.publicUrl;
                    attachment_name = file.name;
                }
                
                const dataToSave = { ...eventDetails, attachment_url, attachment_name };

                if (dataToSave.id) {
                    const { error } = await supabase.from('events').update(dataToSave).eq('id', dataToSave.id);
                    if(error) showNotification("Error updating event.");
                    else {
                        showNotification("Event updated successfully!");
                        triggerNotification('updated_event', dataToSave.title, showNotification);
                    }
                } else {
                    const { error } = await supabase.from('events').insert(dataToSave);
                    if(error) showNotification("Error creating event.");
                    else {
                        showNotification("Event created successfully!");
                        triggerNotification('new_event', dataToSave.title, showNotification);
                    }
                }
                setEditingEvent(null);
                fetchEvents();
            };

            const requestDeleteEvent = (eventId) => {
                setConfirmingDelete(eventId);
            };

            const confirmDeleteEvent = async () => {
                if (confirmingDelete) {
                    const eventToDelete = events.find(e => e.id === confirmingDelete);
                    const { error } = await supabase.from('events').delete().eq('id', confirmingDelete);
                    if(error) {
                        showNotification("Error deleting event.");
                    } else {
                        showNotification("Event deleted successfully.");
                        triggerNotification('deleted_event', eventToDelete.title, showNotification);
                    }
                    setConfirmingDelete(null);
                    fetchEvents();
                }
            };

            const cancelDeleteEvent = () => {
                setConfirmingDelete(null);
            };

            return (
                 <div className="container mx-auto px-6 py-12">
                    {editingEvent && <EventModal theme={theme} event={typeof editingEvent === 'object' ? editingEvent : null} onClose={() => setEditingEvent(null)} onSave={handleSaveEvent} />}
                    {confirmingDelete && (
                        <ConfirmationModal 
                            theme={theme}
                            message="Are you sure you want to delete this event?"
                            onConfirm={confirmDeleteEvent}
                            onCancel={cancelDeleteEvent}
                        />
                    )}
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-4xl font-bold text-gray-800">Community Calendar</h1>
                        <button onClick={() => onNavigate('dashboard')} className="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 flex items-center gap-2">
                            <i className="fas fa-arrow-left"></i> Back to Dashboard
                        </button>
                    </div>
                    {userRole === 'admin' && (
                        <div className="text-right mb-4">
                            <button onClick={() => setEditingEvent(true)} className={`${theme.bg} text-white font-bold py-2 px-4 rounded-lg ${theme.hoverBg} shadow flex items-center gap-2 ml-auto`}>
                                <i className="fas fa-plus"></i> Add Event
                            </button>
                        </div>
                    )}
                    <div className="bg-white p-8 rounded-lg shadow-lg">
                        <div className="space-y-6">
                            {isLoading ? <div className="loader mx-auto"></div> : events.map(event => (
                                <div key={event.id} className="flex flex-col md:flex-row items-start md:items-center justify-between p-6 bg-gray-50 rounded-lg border border-gray-200">
                                    <div className="flex items-center mb-4 md:mb-0">
                                        <div className="text-center w-20 mr-6">
                                            <p className={`${theme.text} font-bold text-lg`}>{event.date ? new Date(event.date.replace(/-/g, '/')).toLocaleDateString('en-US', { month: 'short' }) : ''}</p>
                                            <p className="text-gray-800 font-bold text-3xl">{event.date ? new Date(event.date.replace(/-/g, '/')).getDate() : ''}</p>
                                        </div>
                                        <div>
                                            <h2 className="font-bold text-xl text-gray-800">{event.title}</h2>
                                            <p className="text-gray-600"><i className="far fa-clock mr-2"></i>{event.time}</p>
                                            <p className="text-gray-600"><i className="fas fa-map-marker-alt mr-2"></i>{event.location}</p>
                                            {event.attachment_url && (
                                                <a href={event.attachment_url} target="_blank" rel="noopener noreferrer" className={`${theme.text} hover:underline font-semibold mt-2 inline-block`}>
                                                    <i className="fas fa-paperclip mr-2"></i>Download Attachment
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        {userRole === 'admin' && (
                                            <>
                                                <button onClick={() => setEditingEvent(event)} className="text-gray-500 hover:text-gray-800 py-2 px-3"><i className="fas fa-pencil-alt"></i></button>
                                                <button onClick={() => requestDeleteEvent(event.id)} className="text-red-500 hover:text-red-700 py-2 px-3"><i className="fas fa-trash-alt"></i></button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                 </div>
            );
        };

        const DocumentModal = ({ theme, doc, onClose, onSave }) => {
            const [formData, setFormData] = useState(doc || { name: '', category: 'Governing Documents' });
            const [file, setFile] = useState(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({...prev, [name]: value}));
            };

            const handleFileChange = (e) => {
                setFile(e.target.files[0]);
            };
            
            return (
                <div className="modal-backdrop">
                    <div className="bg-white p-8 rounded-lg shadow-2xl w-full max-w-lg relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
                        <h2 className="text-2xl font-bold text-gray-800 mb-6">{doc ? 'Edit Document' : 'Upload New Document'}</h2>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Document Name</label>
                                <input type="text" name="name" value={formData.name} onChange={handleInputChange} className={`mt-1 w-full px-3 py-2 border rounded-lg ${theme.ring} ${theme.border}`} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Category</label>
                                <select name="category" value={formData.category} onChange={handleInputChange} className={`mt-1 w-full px-3 py-2 border bg-white rounded-lg ${theme.ring} ${theme.border}`}>
                                    <option>Governing Documents</option>
                                    <option>Financial Records</option>
                                    <option>Meeting Info</option>
                                    <option>Contracts & Insurance</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">File</label>
                                <input type="file" onChange={handleFileChange} className="mt-1 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-gray-100" />
                            </div>
                        </div>
                        <div className="mt-8 flex justify-end gap-4">
                            <button onClick={onClose} className="bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300">Cancel</button>
                            <button onClick={() => onSave({...formData, file})} className={`${theme.bg} text-white font-semibold py-2 px-4 rounded-lg ${theme.hoverBg}`}>Save</button>
                        </div>
                    </div>
                </div> 
            ); 
        };
        
        const DocumentsPage = ({ theme, user, userRole, showNotification, onNavigate }) => { 
            const [documents, setDocuments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState(''); 
            const [filterCategory, setFilterCategory] = useState('All'); 
            const [dateFilter, setDateFilter] = useState('');
            const [editingDoc, setEditingDoc] = useState(null); 
            const [confirmingDelete, setConfirmingDelete] = useState(null);
            
            const fetchDocuments = async () => {
                setIsLoading(true);
                const { data, error } = await supabase.from('documents').select('*').order('lastUpdated', { ascending: false });
                if (error) {
                    console.error("Error fetching documents:", error);
                    showNotification("Error fetching documents.");
                } else {
                    setDocuments(data);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                fetchDocuments();
            }, []);

            const categories = ['All', ...new Set(documents.map(doc => doc.category))]; 
            const filteredDocuments = documents.filter(doc => (filterCategory === 'All' || doc.category === filterCategory) && doc.name.toLowerCase().includes(searchTerm.toLowerCase()) && (doc.lastUpdated || '').includes(dateFilter) ); 
            
            const handleSaveDocument = async (docData) => {
                 const { file, name, category, id } = docData;
                 let fileUrl = docData.url;
                 let fileSize = docData.size;

                 if (file) {
                    const filePath = `${Date.now()}-${file.name}`;
                    const { error: uploadError } = await supabase.storage.from('hoa-documents').upload(filePath, file);
                    if (uploadError) {
                        console.error("Error uploading file:", uploadError);
                        showNotification("Error uploading file.");
                        return;
                    }
                    const { data: urlData } = supabase.storage.from('hoa-documents').getPublicUrl(filePath);
                    fileUrl = urlData.publicUrl;
                    fileSize = `${(file.size / 1024).toFixed(2)} KB`;
                 }

                if (id) { // Editing existing document
                    const { error } = await supabase.from('documents').update({ name, category, url: fileUrl, size: fileSize, lastUpdated: new Date().toISOString() }).eq('id', id);
                    if (error) {
                        showNotification("Error updating document.");
                    } else {
                        showNotification("Document updated successfully!");
                        triggerNotification('updated_document', name, showNotification);
                    }
                } else { // Adding new document
                    const { error } = await supabase.from('documents').insert({ name, category, url: fileUrl, size: fileSize, lastUpdated: new Date().toISOString() });
                    if (error) {
                        showNotification("Error adding document.");
                    } else {
                         showNotification("Document uploaded successfully!");
                         triggerNotification('new_document', name, showNotification);
                    }
                }
                setEditingDoc(null);
                fetchDocuments();
            };
            
            const requestDeleteDocument = (docId) => {
                setConfirmingDelete(docId);
            };

            const confirmDeleteDocument = async () => {
                if (confirmingDelete) {
                    const docToDelete = documents.find(d => d.id === confirmingDelete);
                    const { error } = await supabase.from('documents').delete().eq('id', confirmingDelete);
                    if (error) {
                        showNotification("Error deleting document.");
                    } else {
                        showNotification("Document deleted successfully.");
                        triggerNotification('deleted_document', docToDelete.name, showNotification);
                    }
                    setConfirmingDelete(null);
                    fetchDocuments();
                }
            };
            
            const cancelDeleteDocument = () => {
                setConfirmingDelete(null);
            };
            
            return ( 
                <div className="container mx-auto px-6 py-12">
                    {editingDoc && <DocumentModal theme={theme} doc={typeof editingDoc === 'object' ? editingDoc : null} onClose={() => setEditingDoc(null)} onSave={handleSaveDocument} />}
                    {confirmingDelete && (
                        <ConfirmationModal 
                            theme={theme}
                            message="Are you sure you want to delete this document?"
                            onConfirm={confirmDeleteDocument}
                            onCancel={cancelDeleteDocument}
                        />
                    )}
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-4xl font-bold text-gray-800">Document Repository</h1>
                        <button onClick={() => onNavigate('dashboard')} className="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 flex items-center gap-2">
                            <i className="fas fa-arrow-left"></i> Back to Dashboard
                        </button>
                    </div>
                    {userRole === 'admin' && (
                        <div className="text-right mb-4">
                            <button onClick={() => setEditingDoc(true)} className={`${theme.bg} text-white font-bold py-2 px-4 rounded-lg ${theme.hoverBg} shadow flex items-center gap-2 ml-auto`}>
                                <i className="fas fa-plus"></i> Upload</button>
                        </div>
                    )}
                    <div className="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-col md:flex-row gap-4 items-center">
                        <div className="relative flex-grow w-full md:w-auto">
                            <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Search by name..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className={`w-full pl-12 pr-4 py-3 border rounded-lg ${theme.ring} ${theme.border}`} />
                        </div>
                        <div className="relative w-full md:w-64">
                            <i className="fas fa-calendar-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Filter by date (YYYY-MM-DD)" value={dateFilter} onChange={e => setDateFilter(e.target.value)} className={`w-full pl-12 pr-4 py-3 border rounded-lg ${theme.ring} ${theme.border}`} />
                        </div>
                        <div className="relative w-full md:w-64">
                            <i className="fas fa-filter absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className={`w-full appearance-none pl-12 pr-4 py-3 border bg-white rounded-lg ${theme.ring} ${theme.border}`}>
                                <option value="All">All Categories</option>{categories.filter((v,i,a) => a.indexOf(v)===i).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                            <i className="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                        </div>
                    </div>
                    <div className="bg-white rounded-lg shadow-lg overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Updated</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {isLoading ? (
                                        <tr><td colSpan="4" className="text-center py-8"><div className="loader mx-auto"></div></td></tr>
                                    ) : filteredDocuments.map(doc => (
                                    <tr key={doc.id} className="hover:bg-gray-50 transition-colors duration-200">
                                        <td className="px-6 py-4">
                                            <div className="text-sm font-medium text-gray-900">{doc.name}</div>
                                            <div className="text-sm text-gray-500">{doc.size}</div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${ doc.category.includes('Gov') ? 'bg-blue-100 text-blue-800' : doc.category.includes('Finan') ? 'bg-green-100 text-green-800' : 'bg-purple-100 text-purple-800' }`}>{doc.category}</span>
                                        </td>
                                        <td className="px-6 py-4 text-sm text-gray-500">{new Date(doc.lastUpdated).toLocaleDateString()}</td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-4 text-lg">
                                                <a href={doc.url} target="_blank" rel="noopener noreferrer" onClick={() => logAccess(user, doc.name)} className={`${theme.text} hover:underline`} title="Download"><i className="fas fa-download"></i></a>
                                                {userRole === 'admin' && (
                                                    <>
                                                        <button onClick={() => setEditingDoc(doc)} className="text-gray-500 hover:text-gray-800" title="Edit"><i className="fas fa-pencil-alt"></i></button>
                                                        <button onClick={() => requestDeleteDocument(doc.id)} className="text-red-500 hover:text-red-700" title="Delete"><i className="fas fa-trash-alt"></i></button>
                                                    </>
                                                )}
                                            </div>
                                        </td>
                                    </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div> 
            ); 
        };
        
        // --- Main App Component ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [userRole, setUserRole] = useState(null);
            const [user, setUser] = useState(null);
            const [themeName, setThemeName] = useState('blue');
            const [config, setConfig] = useState(null);
            const [notification, setNotification] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            
            const activeTheme = themeClasses[themeName] || themeClasses.blue;

            useEffect(() => {
                const fetchConfig = async () => {
                    const { data, error } = await supabase.from('configuration').select('*').eq('id', 1).single();
                    if (error && error.code === 'PGRST116') {
                        console.warn("Configuration not found in database, using initial config. Please save settings in admin panel to create the record.");
                        setConfig(initialHoaConfig);
                    } else if (error) {
                        console.error("Error fetching configuration:", error.message);
                        setConfig(initialHoaConfig); // Fallback to initial config on other errors
                    } else {
                        setConfig(data);
                        setThemeName(data.themeName || 'blue');
                    }
                    setIsLoading(false);
                };
                fetchConfig();

                const { data: authListener } = supabase.auth.onAuthStateChange(
                    async (event, session) => {
                        if (session?.user) {
                            const { data: userData, error } = await supabase
                                .from('users')
                                .select('*')
                                .eq('id', session.user.id)
                                .single();
                            if (userData) {
                                setUser(userData);
                                setUserRole(userData.role);
                            }
                        } else {
                            setUser(null);
                            setUserRole(null);
                        }
                    }
                );

                return () => {
                    authListener.subscription.unsubscribe();
                };
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => setIsLoading(false), 500);
                return () => clearTimeout(timer);
            }, [currentPage]);
            
            const showNotification = (message) => {
                setNotification(message);
            };

            const navigate = (page) => {
                setIsLoading(true);
                setCurrentPage(page);
                window.scrollTo(0,0);
            };

            const handleLogin = (userData) => {
                setIsLoading(true);
                setUser(userData);
                setUserRole(userData.role);
                setCurrentPage('dashboard');
            };

            const handleLogout = async () => {
                setIsLoading(true);
                await supabase.auth.signOut();
                setUser(null);
                setUserRole(null);
                setCurrentPage('home');
            };

            const renderPage = () => {
                if (!config || isLoading) {
                    return <div className="flex justify-center items-center h-screen"><div className="loader"></div></div>;
                }
                
                // --- Page Access Guards ---
                const memberPages = ['dashboard', 'documents', 'calendar', 'account', 'admin'];
                if (memberPages.includes(currentPage) && !userRole) {
                    return <LoginPage theme={activeTheme} onLogin={handleLogin} showNotification={showNotification} onNavigate={navigate} />;
                }
                if (currentPage === 'admin' && userRole !== 'admin') {
                    return <DashboardPage theme={activeTheme} onNavigate={navigate} userRole={userRole} />;
                }

                switch (currentPage) {
                    case 'home': return <HomePage config={config} theme={activeTheme} onNavigate={navigate} showNotification={showNotification} />;
                    case 'about': return <AboutPage config={config} theme={activeTheme} />;
                    case 'login': return <LoginPage theme={activeTheme} onLogin={handleLogin} showNotification={showNotification} onNavigate={navigate} />;
                    case 'reset-password': return <ResetPasswordPage theme={activeTheme} showNotification={showNotification} onNavigate={navigate} />;
                    case 'dashboard': return <DashboardPage theme={activeTheme} onNavigate={navigate} userRole={userRole} />;
                    case 'admin': return <AdminPage config={config} setConfig={setConfig} theme={activeTheme} themeName={themeName} setThemeName={setThemeName} showNotification={showNotification} onNavigate={navigate} />;
                    case 'documents': return <DocumentsPage theme={activeTheme} user={user} userRole={userRole} showNotification={showNotification} onNavigate={navigate} />;
                    case 'calendar': return <CalendarPage theme={activeTheme} userRole={userRole} showNotification={showNotification} onNavigate={navigate} />;
                    case 'account': return <AccountPage theme={activeTheme} user={user} setUser={setUser} showNotification={showNotification} onNavigate={navigate} />;
                    default: return <HomePage config={config} theme={activeTheme} onNavigate={navigate}/>;
                }
            };
            
            return (
                <div className="flex flex-col min-h-screen bg-white">
                    {notification && <Notification message={notification} onDismiss={() => setNotification('')} />}
                    {!isLoading && config && <Header config={config} theme={activeTheme} userRole={userRole} onLogout={handleLogout} onNavigate={navigate} />}
                    <main className="flex-grow">
                        {renderPage()}
                    </main>
                    {!isLoading && config && <Footer config={config} />}
                    <ScrollToTopButton theme={activeTheme} />
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
